    <h2>Booting Proxy Engine...</h2>

    <script>
        // The site you want to force-load
        const targetUrl = "https://cine-hub-blocked.netlify.app/";

        // 1. Register the Service Worker (This is the magic that bypasses all security)
        navigator.serviceWorker.register('/uv/sw.js', {
            scope: __uv$config.prefix
        }).then(() => {
            // 2. Once the worker is active, encode the URL to bypass filters
            let encodedUrl = __uv$config.encodeUrl(targetUrl);
            
            // 3. Instantly redirect the page through the proxy
            window.location.href = __uv$config.prefix + encodedUrl;
        }).catch(err => {
            document.body.innerHTML = "<h2>Error loading proxy worker. Try refreshing.</h2>";
        });
    </script>
